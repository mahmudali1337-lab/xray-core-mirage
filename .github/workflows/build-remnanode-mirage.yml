name: build-remnanode-mirage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Write Dockerfile
        run: |
          cat > Dockerfile.remnanode <<'EOF'
          FROM golang:1.26-alpine AS build
          RUN apk add --no-cache git
          WORKDIR /src
          COPY . .
          RUN CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
              go build -trimpath -ldflags "-s -w -buildid=" -o /xray ./main

          FROM ghcr.io/remnawave/node:latest
          COPY --from=build /xray /usr/local/bin/xray
          EOF

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.remnanode
          push: true
          tags: |
            ghcr.io/mahmudali1337-lab/remnanode-mirage:latest
            ghcr.io/mahmudali1337-lab/remnanode-mirage:${{ github.sha }}
